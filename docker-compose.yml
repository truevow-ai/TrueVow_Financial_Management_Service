version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fm-postgres
    environment:
      POSTGRES_USER: fm_user
      POSTGRES_PASSWORD: fm_password
      POSTGRES_DB: fm_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fm_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  fm-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fm-service
    environment:
      DATABASE_URL: postgresql+asyncpg://fm_user:fm_password@postgres:5432/fm_database
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
